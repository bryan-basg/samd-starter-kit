# CI de ejemplo para un SaMD. Adaptá los pasos a tu stack ({{FRONTEND_STACK}} / {{BACKEND_STACK}}).
# Optimizaciones obligatorias del kit: concurrency cancel-in-progress + paths-filter + cache + timeout duro.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trace-integrity:
    name: Integridad de trazabilidad documental
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Enlaces cross-doc 0 broken (DHF)
        run: bash scripts/run_local_ci.sh

  frontend:
    name: Frontend (lint + types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # if: cambios en frontend/ (configurá un paths-filter)
    steps:
      - uses: actions/checkout@v4
      # - uses: actions/setup-node@v4
      #   with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json }
      # - run: cd frontend && npm ci && npm run lint && npm run typecheck && npm run test

  backend:
    name: Backend (types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # - uses: actions/setup-python@v5
      #   with: { python-version: '3.12', cache: pip }
      # - run: pip install -r requirements.txt && npm run backend:test

  security:
    name: SAST (Trivy + Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
