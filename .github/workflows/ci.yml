# CI de referencia para un SaMD.
# Stack de referencia: frontend React + TypeScript + Vite + vitest; backend Python + FastAPI + pytest.
# Si tu stack difiere ({{FRONTEND_STACK}} / {{BACKEND_STACK}}), ajustá los `run:` — la ESTRUCTURA
# (paths-filter, cache, timeout duro, concurrency cancel-in-progress, gate de trazabilidad) se mantiene.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Filtro de paths: no corras backend si solo cambió el frontend, y viceversa ----
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'app/**'
              - 'tests/**'
              - 'requirements*.txt'
            docs:
              - 'docs/**'

  # ---- Gate SaMD: integridad de la trazabilidad documental (siempre corre, barato) ----
  trace-integrity:
    name: Trazabilidad documental (enlaces cross-doc)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Link-checker cross-doc (0 broken obligatorio)
        run: bash scripts/check_doc_links.sh

  frontend:
    name: Frontend (lint + types + tests)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --run

  backend:
    name: Backend (types + tests)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TESTING: "True"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Imports muertos (no detectar a ojo)
        run: ruff check app/ --select F401,F841,F811
      - name: Type-check estricto
        run: mypy .
      - name: Tests
        run: npm run backend:test

  contract-sync:
    name: Contrato OpenAPI sincronizado
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip }
      - run: pip install -r requirements.txt
      # Regenera el contrato y falla si quedó desincronizado del commiteado.
      - name: Drift del contrato
        run: |
          python scripts/export_openapi.py --out /tmp/openapi.json
          git diff --no-index --exit-code frontend/src/api/openapi.json /tmp/openapi.json \
            || (echo "::error::El contrato OpenAPI cambió pero no se regeneraron los tipos del frontend" && exit 1)
