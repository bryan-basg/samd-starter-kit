# CI de referencia para un SaMD.
# Stack de referencia: frontend React + TypeScript + Vite + vitest; backend Python + FastAPI + pytest.
#
# En la PLANTILLA vacía, lo único que corre es el gate de trazabilidad documental
# (enlaces cross-doc), que no necesita código de app y siempre pasa. Los jobs de
# app (frontend / backend / contrato) están COMENTADOS abajo: descomentalos cuando
# agregues tu código real (frontend/package.json, requirements.txt).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Gate SaMD: integridad de la trazabilidad documental (siempre corre, barato) ----
  trace-integrity:
    name: Trazabilidad documental (enlaces cross-doc)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Link-checker cross-doc (0 broken obligatorio)
        run: bash scripts/check_doc_links.sh

