# Real-Postgres tier test suite for {{PROJECT_NAME}} ({{DB_STACK}}).
#
# Most of the suite runs against SQLite for speed, which hides driver- and
# dialect-specific behavior (asyncpg greenlet handling, pgvector, server-side
# defaults, ON CONFLICT, JSONB). SaMD {{SAMD_CLASS}} (IEC 62304 5.7) wants the
# data layer verified against the engine it actually ships on. This workflow
# spins up a real Postgres (with the pgvector extension) and runs the tier
# against it.
#
# Cost control: runs only when models/migrations change, plus a 3x/week cron
# and manual dispatch.

name: DB Tier (real Postgres)

on:
  # Triggers automáticos COMENTADOS hasta que tu app/modelos existan. Descomentá al agregarlos.
  # push:
  #   paths:
  #     - "app/models/**"
  #     - "app/database/**"
  #     - "migrations/**"
  #     - "alembic/**"
  #     - ".github/workflows/db-tier.yml"
  # pull_request:
  #   paths:
  #     - "app/models/**"
  #     - "app/database/**"
  #     - "migrations/**"
  #     - "alembic/**"
  #     - ".github/workflows/db-tier.yml"
  # schedule:
  #   - cron: "0 4 * * 1,3,5"   # Lun/Mié/Vie 04:00 UTC
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: db-tier-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-tier:
    name: pytest @ Postgres + pgvector
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        # pgvector image = stock Postgres 16 with the `vector` extension available.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        # Wait until the server actually accepts connections before tests run.
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The app reads this; placeholder creds for CI only — never real secrets.
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: testuser
      PGPASSWORD: testpass
      PGDATABASE: testdb

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Built-in pip cache keyed on the requirements file(s).
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Enable pgvector extension
        # The extension ships in the image but must be created in the database.
        run: |
          PGPASSWORD="${PGPASSWORD}" psql \
            -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" \
            -v ON_ERROR_STOP=1 \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations against Postgres
        run: alembic upgrade head

      - name: Run Postgres-tier test suite
        # Only the tests that need a real Postgres tier (see pytest marker).
        run: pytest -m postgres -ra --tb=short

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: db-tier-logs
          path: |
            .flaky-logs/
            reports/
          retention-days: 14
          if-no-files-found: ignore
