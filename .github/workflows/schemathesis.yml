name: Schemathesis (API contract fuzzing)

# Fuzz testing del contrato OpenAPI: levanta el backend en local (TESTING=True,
# SQLite en memoria, sin servicios externos) y dispara payloads generados contra
# /openapi.json buscando 500s, validaciones laxas y derivas de contrato.
#
#   Proyecto:   {{PROJECT_NAME}}
#   Clase SaMD: {{SAMD_CLASS}}
#   Backend:    {{BACKEND_STACK}}
#
# Marco: IEC 62304 §5.7 (verificación) + GDPR Art.32 / HIPAA (robustez de la
# superficie de ataque del API). NUNCA apunta a producción.
#
# Optimizaciones obligatorias:
#   - paths-filter: solo cuando cambia la superficie del API (routers, schemas).
#   - cron quincenal: sanity contra TODO el OpenAPI por si algo se filtra.
#   - cancel-in-progress: nuevos pushes cancelan corridas viejas.
#   - timeout duro: 20 min.
#   - acciones pineadas a SHA.

on:
  # Triggers automáticos COMENTADOS hasta que tu API exista. Descomentá al agregarla.
  # pull_request:
  #   branches: [main, master]
  #   paths:
  #     - 'app/routers/**'
  #     - 'app/schemas/**'
  #     - 'app/main.py'
  #     - 'app/dependencies.py'
  #     - 'scripts/run_schemathesis.sh'
  #     - '.github/workflows/schemathesis.yml'
  # schedule:
  #   - cron: '0 4 1,15 * *'   # días 1 y 15, 04:00 UTC
  workflow_dispatch:
    inputs:
      examples:
        description: 'Max examples por operación (5=rápido, 50=exhaustivo)'
        required: false
        type: string
        default: '10'

concurrency:
  group: schemathesis-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz API contra OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend + schemathesis
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # requirements-dev.txt opcional (helpers de test); ignorar si no existe.
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
          pip install schemathesis

      - name: Run schemathesis via script
        env:
          # workflow_dispatch puede subir examples a 50 para corridas exhaustivas.
          SCHEMATHESIS_EXAMPLES: ${{ inputs.examples || '10' }}
        run: |
          chmod +x scripts/run_schemathesis.sh
          bash scripts/run_schemathesis.sh

      - name: Upload schemathesis artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.0
        if: always()
        with:
          name: schemathesis-report-${{ github.run_id }}
          path: |
            schemathesis-report.html
            test_schemathesis.db
          retention-days: 7
          if-no-files-found: ignore
