# ============================================================================
# mypy — {{PROJECT_NAME}} (SaMD {{SAMD_CLASS}})
# IEC 62304 §5.5 — tipado estricto demostrable. Prohibido `Any` implícito.
#
# Filosofía RATCHET: arrancás con `strict = True` global y vas APRETANDO
# (nunca aflojando). Cada `# type: ignore` debe estar justificado; los
# `warn_unused_ignores` cazan ignores que ya sobran tras un fix.
#
# NOTA: mypy NO admite comentarios en la misma línea que un valor
# (`clave = True   # comentario` se lee literal y rompe). Los comentarios van
# en su propia línea, arriba de la clave.
# ============================================================================
[mypy]
python_version = 3.12
strict = True
plugins = pydantic.mypy

# Paquetes de terceros sin stubs → no rompen el type-check global.
ignore_missing_imports = True

# --- Ratchet de strictness (explícitos sobre el `strict = True` de arriba) ---
# Se listan a propósito aunque `strict` ya los active: documentan el contrato
# y sobreviven si alguien toca `strict`.
# toda función lleva firma de tipos
disallow_untyped_defs = True
# nada de firmas a medias
disallow_incomplete_defs = True
# no llamar funciones sin tipar
disallow_untyped_calls = True
# `list` prohibido; usar `list[str]`
disallow_any_generics = True
disallow_subclassing_any = True
check_untyped_defs = True
no_implicit_optional = True
no_implicit_reexport = True
warn_return_any = True

# --- Reporting / cazadores de deuda ----------------------------------------
show_error_codes = True
show_absolute_path = False
# `# type: ignore` que ya no hace falta → error
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
warn_no_return = True

# --- Exclusiones (parametrizable) ------------------------------------------
# Regex POSIX. Ajustar a la estructura del proyecto. El código de aplicación
# (`app/`) NUNCA se excluye; sí se excluyen scaffolding y artefactos.
exclude = (?x)(
    ^venv/
    | ^\.venv/
    | ^build/
    | ^dist/
    | ^frontend/
    | ^tests/
    | ^scripts/
    | ^alembic/versions/
  )

# ============================================================================
# OVERRIDES por paquete — EJEMPLOS (comentados para no generar ruido).
# Patrón: cuando una librería externa no trae stubs o usa metaprogramación que
# mypy no resuelve, se relaja SOLO ese namespace, nunca el global. Descomentá y
# reemplazá el nombre del módulo cuando lo necesites.
# ============================================================================

# SDK sin stubs publicados:
# [mypy-some_untyped_sdk.*]
# ignore_missing_imports = True

# ORM con metaprogramación (atributos dinámicos en modelos):
# [mypy-sqlalchemy.*]
# ignore_missing_imports = True

# Dependencia opcional / lazy import (no instalada en todos los venvs).
# `follow_imports = skip` hace el resultado idéntico esté o no instalada.
# [mypy-optional_lazy_dependency.*]
# ignore_missing_imports = True
# follow_imports = skip
