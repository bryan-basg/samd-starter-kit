; pytest configuration for {{PROJECT_NAME}} ({{BACKEND_STACK}})
; SaMD {{SAMD_CLASS}} — verification suite (IEC 62304 5.7).

[pytest]
; --- async ---
; auto mode lets `async def test_*` run without per-test @pytest.mark.asyncio.
; Requires the anyio/asyncio plugin (e.g. pytest-asyncio). Keep ALL I/O async:
; blocking calls (open(), time.sleep(), sync DB drivers) poison the event loop.
asyncio_mode = auto

; --- discovery ---
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; --- base options ---
; -ra        : show a short summary of all non-passing outcomes at the end
; --strict-markers : an unregistered @pytest.mark.* is an error, not a warning
; --strict-config  : typos in this file fail fast instead of being ignored
; --tb=short : compact tracebacks; full tracebacks rarely help in CI logs
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short

; Treat warnings as errors so deprecations surface in CI before they bite.
; Add narrow `ignore::` lines below for known third-party noise only.
filterwarnings =
    error
    ; ignore::DeprecationWarning:somethirdparty.*
    ; Ruido de terceros: el TestClient de Starlette avisa sobre httpx. No es
    ; código nuestro y no afecta el comportamiento bajo test.
    ignore::starlette.exceptions.StarletteDeprecationWarning

; --- custom markers (examples; register every marker you use) ---
markers =
    unit: fast, isolated, no external I/O.
    integration: touches a real dependency (DB, cache, queue).
    clinical: exercises a clinical algorithm/decision path (SaMD-critical).
    security: auth, access control, encryption, audit-trail behavior.
    slow: takes more than a couple of seconds; may be deselected locally.
    postgres: requires a real Postgres tier (not SQLite); see db-tier CI.

; --- COVERAGE NOTE (read before measuring) ---
; Do NOT run coverage *sequentially* over an async + threaded suite:
;   coverage's tracer + greenlet/thread switching corrupt the single SQLite
;   data file, producing phantom misses. Run tests in parallel (xdist) and let
;   each worker write its own coverage data file, then combine them.
; Reproducible recipe (see .coveragerc, which sets parallel = True):
;   coverage erase
;   pytest -n auto --cov --cov-report=               ; parallel run, per-worker data
;   coverage combine                                  ; merge worker data files
;   coverage report --fail-under=95                   ; canonical gate
; The canonical command lives in the project's CI; this note keeps it honest.
